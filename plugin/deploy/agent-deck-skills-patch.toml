# ~/.agent-deck/skills/sources.toml 에 추가할 sources 블록 템플릿
# install-to-home.sh 가 __PLUGIN_DIR__ 을 실제 경로로 치환해 sources.toml 에 병합한다.
# restore-from-home.sh 가 이 블록을 제거한다.
#
# 마커 라인으로 구간을 식별하므로 수동 편집 시 마커를 보존해야 함.

# BEGIN middlek-presets
[sources.middlek]
path = "__PLUGIN_DIR__/plugin/skills"
description = "middlek plugin skills"
enabled = true
# END middlek-presets
