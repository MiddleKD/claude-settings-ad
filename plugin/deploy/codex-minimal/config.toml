model = "gpt-5.3-codex"
model_reasoning_effort = "low"
approval_policy = "never"

[shell_environment_policy]
inherit = "core"
set = { CODEX_PROFILE = "minimal" }

[features]
hooks = true

[hooks.state."__PLUGIN_DIR__/plugin/deploy/.generated/codex-minimal/hooks.json:session_start:0:0"]
enabled = true

[hooks.state."__PLUGIN_DIR__/plugin/deploy/.generated/codex-minimal/hooks.json:stop:0:0"]
enabled = true

[projects."__PLUGIN_DIR__"]
trust_level = "trusted"

[mcp_servers.serena]
command = "uvx"
args = ["--from", "git+https://github.com/oraios/serena", "serena", "start-mcp-server"]

[plugins."middlek-settings@middlek-settings"]
enabled = true

[plugins."superpowers@claude-plugins-official"]
enabled = false

[plugins."agent-deck@agent-deck"]
enabled = false

[plugins."tdd-guard@tdd-guard"]
enabled = false

[plugins."chorus@chorus-plugins"]
enabled = false
