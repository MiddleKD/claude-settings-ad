# ~/.agent-deck/config.toml 에 추가할 profiles + mcps 블록 템플릿
# install-to-home.sh 가 __PLUGIN_DIR__ 을 실제 경로로 치환해 config.toml 에 병합한다.
# restore-from-home.sh 가 이 블록을 제거한다.
#
# 마커 라인으로 구간을 식별하므로 수동 편집 시 마커를 보존해야 함.

# BEGIN middlek-presets
[mcps.serena]
command = "uvx"
args = ["--from", "git+https://github.com/oraios/serena", "serena", "start-mcp-server", "--open-web-dashboard", "false", "--language-backend", "LSP", "--project-from-cwd", "--context", "claude-code"]

[profiles.tdd.claude]
config_dir = "__PLUGIN_DIR__/plugin/deploy/.generated/claude-tdd"

[profiles.collab.claude]
config_dir = "__PLUGIN_DIR__/plugin/deploy/.generated/claude-collab"

[profiles.full.claude]
config_dir = "__PLUGIN_DIR__/plugin/deploy/.generated/claude-full"

[profiles.minimal.claude]
config_dir = "__PLUGIN_DIR__/plugin/deploy/.generated/claude-minimal"
# END middlek-presets
